services:
  - type: web
    name: pdf-to-word
    env: python
    plan: free
    region: frankfurt
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PORT
        value: 10000
